<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل الزرانيق</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .list-item { background: #333; padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #444; }
        .list-item:hover { background: #444; }
        audio { width: 100%; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>قائمة الصوتيات</h2>
    <audio id="player" controls></audio>
    
    <div class="list-item" onclick="document.getElementById('player').src='zamel1.mp3'; document.getElementById('player').play();">
        الزامل الأول
    </div>
    
    <div class="list-item" onclick="document.getElementById('player').src='zamel2.mp3'; document.getElementById('player').play();">
        الزامل الثاني
    </div>
    
    <div class="list-item" onclick="document.getElementById('player').src='zamel3.mp3'; document.getElementById('player').play();">
        الزامل الثالث
    </div>

    <div class="list-item" onclick="document.getElementById('player').src='zamel4.mp3'; document.getElementById('player').play();">
        الزامل الرابع
    </div>

    <div class="list-item" onclick="document.getElementById('player').src='zamel5.mp3'; document.getElementById('player').play();">
        الزامل الخامس
    </div>
</body>
</html>
